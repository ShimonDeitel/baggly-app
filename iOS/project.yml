name: Baggly
options:
  bundleIdPrefix: com.shimondeitel.bagtrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Baggly:
    type: application
    platform: iOS
    sources:
      - path: Baggly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bagtrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Baggly/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BagglyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BagglyTests
      - path: Baggly.storekit
    dependencies:
      - target: Baggly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bagtrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BagglyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BagglyUITests
    dependencies:
      - target: Baggly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.bagtrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Baggly:
    build:
      targets:
        Baggly: all
        BagglyTests: [test]
        BagglyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Baggly.storekit
    test:
      config: Debug
      storeKitConfiguration: Baggly.storekit
      targets:
        - BagglyTests
        - BagglyUITests
    archive:
      config: Release
